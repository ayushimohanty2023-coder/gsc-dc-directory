<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Shapers DC Hub — Our Members</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f1;
      --surface: #ffffff;
      --ink: #1a1915;
      --ink-muted: #6b6860;
      --ink-faint: #b0ada6;
      --accent: #171937;
      --accent-light: #e8f0ec;
      --border: #e2dfd8;
      --sans: 'DM Sans', sans-serif;
      --serif: 'Cormorant Garamond', Georgia, serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--accent);
      padding: 3.5rem 2rem 3rem;
      text-align: center;
    }

    .hub-eyebrow {
      font-family: var(--sans);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.55);
      margin-bottom: 0.75rem;
    }

    header h1 {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 400;
      color: #fff;
      letter-spacing: -0.01em;
      line-height: 1.1;
      margin-bottom: 1rem;
    }

    header h1 em {
      font-style: italic;
      color: #a8c5b2;
    }

    .header-sub {
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.6;
    }

    /* ── Filter bar ── */
    .filter-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .filter-label {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-right: 0.25rem;
    }

    .filter-btn {
      font-family: var(--sans);
      font-size: 0.8rem;
      font-weight: 400;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Grid ── */
    .grid-wrapper {
      max-width: 1120px;
      margin: 0 auto;
      padding: 3rem 2rem 5rem;
    }

    .section-block { margin-bottom: 3.5rem; }

    .section-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .section-title {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 500;
      color: var(--ink);
      white-space: nowrap;
    }

    .section-subtitle {
      font-size: 0.72rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--ink-faint);
      white-space: nowrap;
    }

    .section-rule {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .member-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.5rem;
    }

    /* Leadership section gets 2-col centered grid */
    .member-grid.leadership-grid {
      grid-template-columns: repeat(3, 1fr);
      max-width: 100%;
    }

    @media (max-width: 900px) {
      .member-grid { grid-template-columns: repeat(2, 1fr); }
      .member-grid.leadership-grid { grid-template-columns: repeat(2, 1fr); max-width: 100%; }
    }
    @media (max-width: 560px) {
      .member-grid { grid-template-columns: 1fr; }
      .member-grid.leadership-grid { grid-template-columns: 1fr; }
    }

    /* Alumni cards slightly muted */
    .card.alumni {
      opacity: 0.82;
    }
    .card.alumni:hover { opacity: 1; }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: default;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.07);
    }

    .card-photo {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      object-position: top center;
      background: var(--accent-light);
      display: block;
    }

    .card-photo-placeholder {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .initials-circle {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--serif);
      font-size: 1.6rem;
      font-weight: 500;
      color: #fff;
      letter-spacing: 0.02em;
    }

    .card-body {
      padding: 1.25rem 1.25rem 1rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .card-industry {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
    }

    .card-name {
      font-family: var(--serif);
      font-size: 1.3rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.2;
    }

    .card-role {
      font-size: 0.8rem;
      color: var(--ink-muted);
      line-height: 1.45;
    }

    .card-bio {
      font-size: 0.82rem;
      color: var(--ink-muted);
      line-height: 1.65;
      margin-top: 0.25rem;
      flex: 1;
    }

    .card-footer {
      padding: 0.75rem 1.25rem 1.1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-top: 1px solid var(--border);
      margin-top: auto;
    }

    .card-email {
      font-size: 0.75rem;
      color: var(--ink-faint);
      text-decoration: none;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
    }

    .card-email:hover { color: var(--accent); }

    .linkedin-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      border: 1px solid var(--accent);
      border-radius: 999px;
      padding: 0.28rem 0.75rem;
      white-space: nowrap;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .linkedin-btn:hover { background: var(--accent); color: #fff; }

    .linkedin-icon {
      width: 13px;
      height: 13px;
    }

    /* ── Modal overlay ── */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 15, 12, 0.6);
      z-index: 500;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .modal-backdrop.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 16px;
      max-width: 580px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .modal-photo {
      width: 100%;
      max-height: 280px;
      object-fit: cover;
      object-position: top center;
      border-radius: 16px 16px 0 0;
      background: var(--accent-light);
    }

    .modal-photo-placeholder {
      width: 100%;
      height: 200px;
      background: var(--accent-light);
      border-radius: 16px 16px 0 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-body {
      padding: 1.75rem 2rem 2rem;
    }

    .modal-industry {
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-faint);
      margin-bottom: 0.4rem;
    }

    .modal-name {
      font-family: var(--serif);
      font-size: 2rem;
      font-weight: 500;
      color: var(--ink);
      line-height: 1.1;
      margin-bottom: 0.4rem;
    }

    .modal-role {
      font-size: 0.9rem;
      color: var(--ink-muted);
      margin-bottom: 1.25rem;
    }

    .modal-bio {
      font-size: 0.92rem;
      line-height: 1.75;
      color: var(--ink-muted);
      margin-bottom: 1.5rem;
    }

    .modal-actions {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .modal-linkedin {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      font-weight: 500;
      color: #fff;
      background: var(--accent);
      text-decoration: none;
      border-radius: 999px;
      padding: 0.5rem 1.2rem;
      transition: opacity 0.15s;
    }

    .modal-linkedin:hover { opacity: 0.85; }

    .modal-email-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.82rem;
      font-weight: 400;
      color: var(--ink-muted);
      text-decoration: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.5rem 1.2rem;
      transition: border-color 0.15s;
    }

    .modal-email-link:hover { border-color: var(--accent); color: var(--accent); }

    .modal-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(255,255,255,0.9);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--ink);
      transition: background 0.15s;
    }

    .modal-close:hover { background: #fff; }

    .modal-wrapper { position: relative; }

    /* ── Footer ── */
    footer {
      background: var(--accent);
      padding: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
    }

    /* ── Hidden ── */
    .hidden { display: none !important; }

    /* ── Fade-in ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card { animation: fadeUp 0.35s ease both; }
  </style>
</head>
<body>

<header>
  <p class="hub-eyebrow">World Economic Forum · Global Shapers</p>
  <h1>Global Shapers Community · Washington D.C. Hub<br><em>Our Members</em></h1>
  <p class="header-sub">Young leaders shaping the future of policy, technology, and civic life in Washington, DC.</p>
</header>

<nav class="filter-bar" aria-label="Filter by industry">
  <span class="filter-label">Filter</span>
  <button class="filter-btn active" data-filter="all">All</button>
</nav>

<main class="grid-wrapper" id="main-content"></main>

<!-- Modal -->
<div class="modal-backdrop" id="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modal-name">
  <div class="modal-wrapper">
    <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
    <div class="modal" id="modal-content"></div>
  </div>
</div>

<footer>
  &copy; 2025 Global Shapers DC Hub &nbsp;·&nbsp; A World Economic Forum Initiative
</footer>

<script>
  const ROLE_ORDER = ['Curator', 'Vice Curator', 'Impact Officer', 'Current Shaper', 'Alumni'];

  const SECTIONS = [
    {
      key: 'leadership',
      title: 'Leadership',
      subtitle: '2026–27',
      roles: ['Curator', 'Vice Curator', 'Impact Officer'],
      gridClass: 'leadership-grid'
    },
    {
      key: 'shapers',
      title: 'Current Shapers',
      subtitle: null,
      roles: ['Current Shaper'],
      gridClass: ''
    },
    {
      key: 'alumni',
      title: 'Alumni',
      subtitle: null,
      roles: ['Alumni'],
      gridClass: ''
    }
  ];

  async function loadMembers() {
    const res = await fetch('members.json');
    return res.json();
  }

  function initials(name) {
    return name.split(' ').map(p => p[0]).join('').slice(0, 2).toUpperCase();
  }

  function photoEl(member, cls, placeholderHeight) {
    if (member.headshot) {
      const img = document.createElement('img');
      img.src = member.headshot;
      img.alt = member.name;
      img.className = cls;
      img.onerror = function() { this.replaceWith(placeholder(member, placeholderHeight)); };
      return img;
    }
    return placeholder(member, placeholderHeight);
  }

  function placeholder(member, height) {
    const div = document.createElement('div');
    div.className = 'card-photo-placeholder';
    if (height) div.style.height = height;
    const circle = document.createElement('div');
    circle.className = 'initials-circle';
    circle.textContent = initials(member.name);
    div.appendChild(circle);
    return div;
  }

  function buildCard(member, idx) {
    const card = document.createElement('div');
    card.className = 'card' + (member.internal_role === 'Alumni' ? ' alumni' : '');
    card.style.animationDelay = `${idx * 0.06}s`;
    card.dataset.industry = member.industry;
    card.dataset.role = member.internal_role;

    card.appendChild(photoEl(member, 'card-photo'));

    const body = document.createElement('div');
    body.className = 'card-body';
    body.innerHTML = `
      <p class="card-industry">${member.industry}</p>
      <p class="card-name">${member.name}</p>
      <p class="card-role">${member.internal_role}</p>
      <p class="card-role">${member.role}</p>
      <p class="card-bio">${member.bio.length > 100 ? member.bio.slice(0, 100).trimEnd() + '…' : member.bio}</p>
    `;
    card.appendChild(body);

    const footer = document.createElement('div');
    footer.className = 'card-footer';
    footer.innerHTML = `
      <a class="card-email" href="mailto:${member.email}">${member.email}</a>
      ${member.linkedin ? `<a class="linkedin-btn" href="${member.linkedin}" target="_blank" rel="noopener">
        <svg class="linkedin-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3A2 2 0 0 1 21 5V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V5A2 2 0 0 1 5 3H19M18.5 18.5V13.2A3.26 3.26 0 0 0 15.24 9.94C14.39 9.94 13.4 10.46 12.92 11.24V10.13H10.13V18.5H12.92V13.57A1.46 1.46 0 0 1 14.38 12.11A1.46 1.46 0 0 1 15.84 13.57V18.5H18.5M6.88 8.56A1.68 1.68 0 0 0 8.56 6.88A1.68 1.68 0 0 0 6.88 5.2A1.68 1.68 0 0 0 5.2 6.88A1.68 1.68 0 0 0 6.88 8.56M8.27 18.5V10.13H5.5V18.5H8.27Z"/></svg>
        LinkedIn
      </a>` : ''}
    `;
    card.appendChild(footer);

    card.addEventListener('click', (e) => { if (!e.target.closest('a')) openModal(member); });
    return card;
  }

  function buildSection(section, members, globalIdx) {
    const filtered = members.filter(m => section.roles.includes(m.internal_role));
    if (!filtered.length) return null;

    // Sort within section by ROLE_ORDER then by name
    filtered.sort((a, b) => {
      const ri = ROLE_ORDER.indexOf(a.internal_role) - ROLE_ORDER.indexOf(b.internal_role);
      return ri !== 0 ? ri : a.name.localeCompare(b.name);
    });

    const block = document.createElement('div');
    block.className = 'section-block';
    block.dataset.section = section.key;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <h2 class="section-title">${section.title}</h2>
      ${section.subtitle ? `<span class="section-subtitle">${section.subtitle}</span>` : ''}
      <div class="section-rule"></div>
    `;
    block.appendChild(header);

    const grid = document.createElement('div');
    grid.className = 'member-grid ' + (section.gridClass || '');
    filtered.forEach((m, i) => grid.appendChild(buildCard(m, globalIdx + i)));
    block.appendChild(grid);

    return { block, count: filtered.length };
  }

  function openModal(member) {
    const content = document.getElementById('modal-content');
    content.innerHTML = '';
    content.appendChild(photoEl(member, 'modal-photo', '200px'));

    const body = document.createElement('div');
    body.className = 'modal-body';
    body.innerHTML = `
      <p class="modal-industry">${member.industry} · ${member.internal_role}</p>
      <h2 class="modal-name" id="modal-name">${member.name}</h2>
      <p class="modal-role">${member.role}</p>
      <p class="modal-bio">${member.bio}</p>
      <div class="modal-actions">
        ${member.linkedin ? `<a class="modal-linkedin" href="${member.linkedin}" target="_blank" rel="noopener">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19 3A2 2 0 0 1 21 5V19A2 2 0 0 1 19 21H5A2 2 0 0 1 3 19V5A2 2 0 0 1 5 3H19M18.5 18.5V13.2A3.26 3.26 0 0 0 15.24 9.94C14.39 9.94 13.4 10.46 12.92 11.24V10.13H10.13V18.5H12.92V13.57A1.46 1.46 0 0 1 14.38 12.11A1.46 1.46 0 0 1 15.84 13.57V18.5H18.5M6.88 8.56A1.68 1.68 0 0 0 8.56 6.88A1.68 1.68 0 0 0 6.88 5.2A1.68 1.68 0 0 0 5.2 6.88A1.68 1.68 0 0 0 6.88 8.56M8.27 18.5V10.13H5.5V18.5H8.27Z"/></svg>
          View LinkedIn
        </a>` : ''}
        <a class="modal-email-link" href="mailto:${member.email}">${member.email}</a>
      </div>
    `;
    content.appendChild(body);
    document.getElementById('modal-backdrop').classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal-backdrop').classList.remove('open');
    document.body.style.overflow = '';
  }

  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-backdrop').addEventListener('click', (e) => {
    if (e.target === document.getElementById('modal-backdrop')) closeModal();
  });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  function buildFilters(members) {
    const industries = [...new Set(members.map(m => m.industry))].sort();
    const bar = document.querySelector('.filter-bar');
    industries.forEach(ind => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = ind;
      btn.textContent = ind;
      bar.appendChild(btn);
    });

    bar.addEventListener('click', (e) => {
      if (!e.target.matches('.filter-btn')) return;
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      const filter = e.target.dataset.filter;
      document.querySelectorAll('.card').forEach(card => {
        card.classList.toggle('hidden', filter !== 'all' && card.dataset.industry !== filter);
      });
      // Hide section blocks that become empty
      document.querySelectorAll('.section-block').forEach(block => {
        const visible = [...block.querySelectorAll('.card')].some(c => !c.classList.contains('hidden'));
        block.classList.toggle('hidden', !visible);
      });
    });
  }

  loadMembers().then(members => {
    buildFilters(members);
    const main = document.getElementById('main-content');
    let idx = 0;
    SECTIONS.forEach(section => {
      const result = buildSection(section, members, idx);
      if (result) { main.appendChild(result.block); idx += result.count; }
    });
  }).catch(() => {
    document.getElementById('main-content').innerHTML = '<p style="color:#888;text-align:center;padding:3rem 0;">Could not load members.json — make sure the file is in the same directory.</p>';
  });
</script>
</body>
</html>
